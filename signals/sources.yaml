# My-TW-Coverage — Signal Layer source registry (v1)
# Spec: PS-20260701-002-T07 §2.1（2026-07-02 收斂）
#
# Source policy:
#   1. news tier 的數字不當硬事實，必須 cross-check 官源後才採用（對齊 F5）。
#   2. 市場資料類（價量 / 融資券 / 法人）為全量 time-series，不逐筆產 signal；
#      只有異常 flag（創新高 / 連 N 月成長 / 法人異常買賣超）才建 signal，維持 thin trigger 邊界。
#   3. tier 對齊 trust hierarchy：government / company_disclosure / exchange > news > social。
#   4. access: free / paid — 之後回測只允許官方 free / paid 源，registry 層直接過濾。
#
# 欄位: name / category / tier / url / cadence / access（+ 選填 notes / alt_urls）

sources:
  # ── 政策 / 法規 ──────────────────────────────
  - name: 經濟部產業發展署 — 產業政策公告
    category: policy_regulation
    tier: government
    url: https://www.ida.gov.tw/ctlr?PRO=policy.rwdPolicyAllList
    cadence: irregular
    access: free
    notes: 補助方案 / 產業政策公告

  - name: 國科會 — 計畫徵求專區
    category: policy_regulation
    tier: government
    url: https://www.nstc.gov.tw/folksonomy/rfpList?l=ch
    cadence: irregular
    access: free
    notes: 補助徵案 / 專題研究計畫

  - name: 金管會官網
    category: policy_regulation
    tier: government
    url: https://www.fsc.gov.tw
    cadence: irregular
    access: free
    notes: 金融監理政策 / 法規命令

  - name: 全國法規資料庫
    category: policy_regulation
    tier: government
    url: https://law.moj.gov.tw
    cadence: event_driven
    access: free
    notes: 公告指向的實際條文作事實底稿

  # ── 公司 / 交易所 ────────────────────────────
  - name: MOPS 公開資訊觀測站 — 重大訊息
    category: company_disclosure
    tier: company_disclosure
    url: https://mops.twse.com.tw
    cadence: daily
    access: free

  - name: MOPS — 月營收公告
    category: company_disclosure
    tier: company_disclosure
    url: https://mops.twse.com.tw
    cadence: monthly
    access: free

  - name: MOPS — 法說會公告
    category: company_disclosure
    tier: company_disclosure
    url: https://mops.twse.com.tw
    cadence: irregular
    access: free

  - name: 上市公司每月營業收入彙總表（政府開放資料）
    category: company_disclosure
    tier: government
    url: https://data.gov.tw/dataset/18420
    cadence: monthly
    access: free
    notes: 機器可讀、政府開放授權；⚠️ dataset id 開工時再確認一次

  - name: 上市公司基本資料（政府開放資料）
    category: company_disclosure
    tier: government
    url: https://data.gov.tw/dataset/18419
    cadence: low_freq
    access: free
    notes: ticker ↔ 公司名 mapping 用；⚠️ dataset id 開工時再確認一次

  # ── 市場資料 ────────────────────────────────
  - name: TWSE OpenAPI — 個股日成交
    category: market_data
    tier: exchange
    url: https://openapi.twse.com.tw
    cadence: daily
    access: free

  - name: TPEx open data — 上櫃個股價量
    category: market_data
    tier: exchange
    url: https://www.tpex.org.tw/openapi/
    cadence: daily
    access: free

  - name: TPEx open data — 上櫃融資融券餘額
    category: market_data
    tier: exchange
    url: https://data.gov.tw/dataset/11387
    cadence: daily
    access: free

  - name: TPEx open data — 上櫃三大法人買賣明細
    category: market_data
    tier: exchange
    url: https://data.nat.gov.tw/dataset/11856
    cadence: daily
    access: free

  - name: TWSE — 融資融券餘額概況表
    category: market_data
    tier: exchange
    url: https://www.twse.com.tw/zh/trading/margin/mi-margn.html
    cadence: monthly
    access: free
    notes: ⚠️ 月度粒度，不得偽裝日級資料

  - name: TWSE — 上市三大法人買賣超日報（T86）
    category: market_data
    tier: exchange
    url: https://www.twse.com.tw/zh/trading/foreign/t86.html
    url_template: "https://www.twse.com.tw/rwd/zh/fund/T86?date=YYYYMMDD&selectType=ALLBUT0999&response=json"
    cadence: daily
    access: free
    notes: legacy JSON（非 OpenAPI Swagger）；注意請求頻率限制；Data E-Shop（paid）僅作批次檔 fallback

  # ── 技術 / 專利 / 論文 ───────────────────────
  - name: TIPO — 專利公報 / 公開資訊查詢
    category: tech_patent_paper
    tier: government
    url: https://cloud.tipo.gov.tw/S220/gazette/patent
    cadence: periodic
    access: free

  - name: 國際專利庫（USPTO / Espacenet / WIPO PATENTSCOPE）
    category: tech_patent_paper
    tier: government
    url: https://worldwide.espacenet.com
    cadence: event_driven
    access: free
    alt_urls:
      - https://www.uspto.gov
      - https://patentscope.wipo.int
    notes: TIPO 白名單國際源

  - name: arXiv（cs.LG / cs.CL / cs.AI 等）
    category: tech_patent_paper
    tier: paper
    url: https://arxiv.org
    cadence: daily
    access: free
    notes: 可借力本地 arXiv MCP（arxiv_index_search / arxiv_get_fulltext）

  - name: 頂會論文庫（NeurIPS / ICML / ICLR 等）
    category: tech_patent_paper
    tier: paper
    url: https://openreview.net
    cadence: conference_driven
    access: free

  # ── 產業新聞 ────────────────────────────────
  - name: DIGITIMES 產業資訊網
    category: industry_news
    tier: news
    url: https://www.digitimes.com.tw
    cadence: daily
    access: free
    notes: 解讀層；數字須 cross-check 官源

  - name: 經濟日報 — 產業版 / 科技產業 tag
    category: industry_news
    tier: news
    url: https://money.udn.com/industry/index
    cadence: daily
    access: free
    notes: 解讀層；數字須 cross-check 官源
  # ── 錨定客戶 IR（白名單制：只收反覆出現的 anchor，季級檢視，不逐 signal 增補）──
  - name: NVIDIA Newsroom / IR
    category: company_disclosure
    tier: company_disclosure
    url: https://nvidianews.nvidia.com
    cadence: event_driven
    access: free
    notes: 錨定客戶白名單；fact_check 二源優先序第一層；⚠️ 開工時驗

  - name: Micron IR
    category: company_disclosure
    tier: company_disclosure
    url: https://investors.micron.com
    cadence: event_driven
    access: free
    notes: 錨定客戶白名單；驗財報/長約類 signal 用；⚠️ 開工時驗

  # ── 總經 / 產業統計（缺口 #5）─────────────
  - name: 經濟部統計處 — 經濟統計數據分析系統 EE521
    category: macro_statistics
    tier: government
    url: https://service.moea.gov.tw/EE521/
    cadence: monthly
    access: free
    notes: 外銷訂單（約每月 20 日）、工業產銷存；產業分類碼對個股需自建 mapping；⚠️ 開工時驗

  # ── 產業鏈對應（mapping_check 官方源）──────
  - name: TPEx 產業價值鏈資訊平台
    category: industry_mapping
    tier: exchange
    url: https://ic.tpex.org.tw/
    cadence: low_freq
    access: free
    notes: 官方「產業鏈→公司」對應；補 EE521 分類碼對不到個股的缺陷；⚠️ 開工時驗

  # ── 法說（缺口 #6：日曆＋簡報取得）─────────
  - name: TDCC IR Platform — 法說會及活動
    category: company_disclosure
    tier: exchange
    url: https://irplatform.tdcc.com.tw/ir/zh/event/list
    cadence: daily
    access: free
    notes: 法說行事曆＋部分簡報 PDF 下載；搭配 OCR lane（Patch C）；⚠️ 開工時驗

  - name: MOPS 電子書 — 財報/年報/股東會年報 PDF
    category: company_disclosure
    tier: company_disclosure
    url: https://mops.twse.com.tw
    cadence: quarterly
    access: free
    notes: 法定時限 Q1 5/15、Q2 8/14、Q3 11/14、年報 3/31（資本額≥100億 3/15）；PDF 有文字層，pymupdf 抽字即可

  # ── 產業研究（缺口 #4 半解：free 層只有區間/方向）──
  - name: TrendForce 價格頁（DRAM spot / contract）
    category: industry_research
    tier: report
    url: https://www.trendforce.com.tw/price/dram/dram_spot
    cadence: daily
    access: free
    notes: free 層僅 summary 與部分數字；深度供需/產能 paid，暫不訂；⚠️ 開工時驗


source_tier:
  # 源分層定義（PS-20260701-002-T17）
  # 連動 F4 source trust hierarchy runtime 化，第一消費者 = T17
  tiers:
    T1:
      label: 官源
      desc: "政府 / 交易所 / MOPS / 公司 IR・法說 direct"
    T2:
      label: 半官方
      desc: "TDCC / EE521 / TPEx 產業價值鏈 / TrendForce free 等結構化平台"
    T3:
      label: 財經媒體
      desc: "產業新聞 / 研究報告 free 層；v1 不作證據只進 gaps"
    T4-hook:
      label: 具名研究者
      desc: "571 curated 外部個別研究者；confidence_cap: low"
